<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAGI.C — Captura de Fotos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: #888;
    --accent: #c8f560;
    --accent-dim: rgba(200,245,96,0.12);
    --red: #ff5252;
    --red-dim: rgba(255,82,82,0.12);
    --blue: #60b5f5;
    --blue-dim: rgba(96,181,245,0.12);
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 16px 24px;
    overflow-y: auto;
  }

  .barcode-section {
    margin-bottom: 20px;
    display: flex;
    gap: 8px;
  }

  .barcode-section input {
    flex: 1;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 15px;
    outline: none;
  }

  .barcode-section input:focus {
    border-color: var(--accent);
  }

  .barcode-section input::placeholder { color: var(--muted); }

  .photo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .photo-slot {
    position: relative;
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .photo-slot:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .photo-slot.has-image {
    border-color: var(--accent);
  }

  .photo-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-label {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
  }

  .photo-slot.has-image .photo-label {
    background: rgba(200,245,96,0.2);
  }

  .photo-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
  }

  .photo-placeholder svg {
    opacity: 0.3;
  }

  .photo-placeholder p {
    font-size: 12px;
    text-align: center;
  }

  input[type="file"] { display: none; }

  .action-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .btn {
    padding: 14px 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    transition: opacity 0.15s;
  }

  .btn:active { opacity: 0.8; }

  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #0a0a0a;
  }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
  }

  .btn-danger {
    background: var(--red-dim);
    border: 1px solid rgba(255,82,82,0.2);
    color: var(--red);
  }

  .message {
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    margin-bottom: 16px;
    text-align: center;
  }

  .message.info {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .message.error {
    background: var(--red-dim);
    color: var(--red);
  }

  .message.success {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .loading {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(200,245,96,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .stats {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .stats div {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .stats div:last-child { margin-bottom: 0; }
</style>
</head>
<body>

<header>
  <div class="logo">MAGI<span>.</span>C — Fotos</div>
  <div class="status-dot"></div>
</header>

<div class="container">
  <div class="barcode-section">
    <input type="text" id="barcodeInput" placeholder="Código do produto" inputmode="text">
  </div>

  <div id="messageArea"></div>

  <div class="photo-grid" id="photoGrid">
    <div class="photo-slot" onclick="triggerPhotoCapture(0)">
      <input type="file" id="photo0" accept="image/jpeg,image/png,image/webp" capture="environment" onchange="handlePhotoSelect(0, event)">
      <div class="photo-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm0-13c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5z"/>
        </svg>
        <p>Toque para<br>foto 1</p>
      </div>
      <img id="preview0" style="display: none;">
      <div class="photo-label">Frente</div>
    </div>

    <div class="photo-slot" onclick="triggerPhotoCapture(1)">
      <input type="file" id="photo1" accept="image/jpeg,image/png,image/webp" capture="environment" onchange="handlePhotoSelect(1, event)">
      <div class="photo-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm0-13c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5z"/>
        </svg>
        <p>Toque para<br>foto 2</p>
      </div>
      <img id="preview1" style="display: none;">
      <div class="photo-label">Costas</div>
    </div>

    <div class="photo-slot" onclick="triggerPhotoCapture(2)">
      <input type="file" id="photo2" accept="image/jpeg,image/png,image/webp" capture="environment" onchange="handlePhotoSelect(2, event)">
      <div class="photo-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm0-13c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5z"/>
        </svg>
        <p>Toque para<br>foto 3</p>
      </div>
      <img id="preview2" style="display: none;">
      <div class="photo-label">Dobrada</div>
    </div>
  </div>

  <div class="action-buttons">
    <button class="btn btn-primary" id="btnUpload" onclick="uploadPhotos()" disabled>Salvar 3 fotos</button>
    <button class="btn btn-secondary" onclick="resetForm()">Limpar</button>

    <div class="action-buttons" id="previewButtonContainer" style="display: none;">
      <button class="btn btn-primary" id="btnGeneratePreview" onclick="generatePreview()" style="background: linear-gradient(135deg, #c8f560 0%, #95d600 100%); color: #0a0a0a;">
        🎨 Gerar Preview Manequim
      </button>
    </div>

    <div id="previewSection" style="display: none; margin-top: 20px;">
      <img id="generatedPreview" style="width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); object-fit: cover;">
    </div>
  </div>

  <div class="stats" id="stats" style="display: none;">
    <div><span>Fotos capturadas:</span> <span id="photoCount">0/3</span></div>
    <div><span>Tamanho total:</span> <span id="totalSize">0 KB</span></div>
    <div><span>Status:</span> <span id="uploadStatus">Pronto</span></div>
  </div>
</div>

<script>
  const photos = [null, null, null];
  const photoSizes = [0, 0, 0];
  const photoPositions = ['Frente', 'Costas', 'Dobrada'];
  let lastUploadedBarcode = '';
  const MAX_SIZE = 8 * 1024 * 1024; // 8MB por foto
  const COMPRESS_QUALITY = 0.85;
  const MAX_WIDTH = 1600;

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function showMessage(text, type = 'info') {
    const area = document.getElementById('messageArea');
    area.innerHTML = `<div class="message ${type}">${escapeHtml(text)}</div>`;
    setTimeout(() => {
      if (area.innerHTML.includes(escapeHtml(text))) {
        area.innerHTML = '';
      }
    }, 4000);
  }

  function triggerPhotoCapture(index) {
    const input = document.getElementById(`photo${index}`);
    input.click();
  }

  async function handlePhotoSelect(index, event) {
    const file = event.target.files?.[0];
    if (!file) return;

    if (file.size > MAX_SIZE) {
      showMessage(`Foto ${index + 1} excede ${MAX_SIZE / 1024 / 1024}MB`, 'error');
      return;
    }

    try {
      const compressed = await compressImage(file);
      photos[index] = compressed;
      photoSizes[index] = compressed.size;

      const url = URL.createObjectURL(compressed);
      const preview = document.getElementById(`preview${index}`);
      preview.src = url;
      preview.style.display = 'block';

      const slot = document.querySelectorAll('.photo-slot')[index];
      slot.classList.add('has-image');
      slot.querySelector('.photo-placeholder').style.display = 'none';

      updateStats();
      document.getElementById('btnUpload').disabled = false;
    } catch (err) {
      showMessage(`Erro ao processar foto ${index + 1}: ${err.message}`, 'error');
    }
  }

  async function compressImage(file) {
    const url = URL.createObjectURL(file);
    try {
      const img = await new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = url;
      });

      const scale = Math.min(1, MAX_WIDTH / img.width);
      const width = Math.round(img.width * scale);
      const height = Math.round(img.height * scale);

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      if (!ctx) throw new Error('Canvas context not available');

      ctx.drawImage(img, 0, 0, width, height);

      const blob = await new Promise((resolve) => {
        canvas.toBlob((b) => resolve(b), 'image/jpeg', COMPRESS_QUALITY);
      });

      if (!blob) throw new Error('Compression failed');

      return new File([blob], `temp-${Date.now()}.jpg`, { type: 'image/jpeg' });
    } finally {
      URL.revokeObjectURL(url);
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = () => reject(new Error('Falha ao ler arquivo para base64'));
      reader.readAsDataURL(file);
    });
  }

  async function parseResponsePayload(response) {
    const contentType = String(response.headers.get('content-type') || '').toLowerCase();
    const rawText = await response.text();

    if (!rawText) {
      return {};
    }

    if (contentType.includes('application/json')) {
      try {
        return JSON.parse(rawText);
      } catch {
        return { error: 'Resposta JSON inválida do servidor.' };
      }
    }

    try {
      return JSON.parse(rawText);
    } catch {
      return { error: rawText.slice(0, 300) };
    }
  }

  function updateStats() {
    const count = photos.filter(p => p !== null).length;
    const total = photoSizes.reduce((a, b) => a + b, 0);
    document.getElementById('photoCount').textContent = `${count}/3`;
    document.getElementById('totalSize').textContent = `${(total / 1024).toFixed(1)} KB`;
    document.getElementById('stats').style.display = 'block';
  }

  async function generatePreview() {
    const inputBarcode = document.getElementById('barcodeInput').value.trim();
    const barcode = inputBarcode || lastUploadedBarcode;
    const btn = document.getElementById('btnGeneratePreview');

    if (!barcode) {
      showMessage('Informe o código do produto antes de gerar preview', 'error');
      return;
    }

    btn.disabled = true;

    try {
      showMessage('Gerando preview com manequim... isto pode levar alguns segundos', 'info');

      const response = await fetch(`/products/${barcode}/generate-preview`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Tunnel-Skip-AntiPhishing-Page': 'true'
        }
      });

      const data = await parseResponsePayload(response);

      if (!response.ok) {
        throw new Error(data.error || 'Erro ao gerar preview');
      }

      const img = document.getElementById('generatedPreview');
      img.src = data.previewUrl + '?t=' + Date.now();
      document.getElementById('previewSection').style.display = 'block';

      showMessage('Preview gerado com sucesso! ✨', 'success');
    } catch (err) {
      showMessage(`Erro ao gerar preview: ${err.message}`, 'error');
      btn.disabled = false;
    }
  }

  async function uploadPhotos() {
    const barcode = document.getElementById('barcodeInput').value.trim();

    if (!barcode) {
      showMessage('Informe o código do produto', 'error');
      return;
    }

    const photosCount = photos.filter(p => p !== null).length;
    if (photosCount === 0) {
      showMessage('Capture pelo menos uma foto', 'error');
      return;
    }

    const btn = document.getElementById('btnUpload');
    btn.disabled = true;

    try {
      document.getElementById('uploadStatus').textContent = 'Enviando...';

      for (let i = 0; i < 3; i++) {
        if (!photos[i]) continue;

        const file = photos[i];
        const fileName = `${barcode}_${photoPositions[i]}.jpg`;

        document.getElementById('uploadStatus').textContent = `Foto ${i + 1}/3...`;

        // Gera URL assinada
        const uploadUrlRes = await fetch('/products/images/upload-url', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Tunnel-Skip-AntiPhishing-Page': 'true'
          },
          body: JSON.stringify({
            fileName,
            contentType: 'image/jpeg',
            bucket: 'magic-ecommerce-fotos',
            productId: barcode
          })
        });

        const uploadData = await parseResponsePayload(uploadUrlRes);
        if (!uploadUrlRes.ok) {
          throw new Error(uploadData.error || `Falha ao preparar upload da foto ${i + 1}`);
        }

        // Upload para GCS por URL assinada
        try {
          const uploadRes = await fetch(uploadData.signedUrl, {
            method: 'PUT',
            headers: { 'Content-Type': 'image/jpeg' },
            body: file
          });

          if (!uploadRes.ok) {
            throw new Error(`Falha ao enviar foto ${i + 1} para o bucket`);
          }
        } catch (signedUrlError) {
          // Fallback para upload via backend quando o navegador bloqueia PUT cross-origin
          const signedUrlMessage = String(signedUrlError?.message || signedUrlError || '');
          const shouldFallback = signedUrlError instanceof TypeError || /failed to fetch/i.test(signedUrlMessage);

          if (!shouldFallback) {
            throw signedUrlError;
          }

          const fileBase64 = await fileToBase64(file);
          const fallbackRes = await fetch('/products/images/upload', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Tunnel-Skip-AntiPhishing-Page': 'true'
            },
            body: JSON.stringify({
              fileName,
              contentType: 'image/jpeg',
              bucket: 'magic-ecommerce-fotos',
              productId: barcode,
              fileBase64
            })
          });

          const fallbackData = await parseResponsePayload(fallbackRes);
          if (!fallbackRes.ok) {
            throw new Error(fallbackData.error || `Falha no fallback da foto ${i + 1}`);
          }
        }
      }

      document.getElementById('uploadStatus').textContent = 'Concluído!';
      lastUploadedBarcode = barcode;
      showMessage(`${photosCount} foto(s) salva(s) com sucesso!`, 'success');
          // Mostrar botão de gerar preview se as 2 primeiras fotos foram salvas
          if (photos[0] && photos[1]) {
            setTimeout(() => {
              document.getElementById('previewButtonContainer').style.display = 'flex';
            }, 1500);
          }
    } catch (err) {
      document.getElementById('uploadStatus').textContent = 'Erro';
      showMessage(`Erro ao salvar fotos: ${err.message}`, 'error');
      btn.disabled = false;
    }
  }

  function resetForm() {
    photos.fill(null);
    photoSizes.fill(0);

    for (let i = 0; i < 3; i++) {
      document.getElementById(`photo${i}`).value = '';
      document.getElementById(`preview${i}`).style.display = 'none';
      document.querySelectorAll('.photo-slot')[i].classList.remove('has-image');
      document.querySelectorAll('.photo-slot')[i].querySelector('.photo-placeholder').style.display = 'flex';
    }

    document.getElementById('barcodeInput').value = '';
    document.getElementById('barcodeInput').focus();
    lastUploadedBarcode = '';
    document.getElementById('btnUpload').disabled = true;
    const previewButton = document.getElementById('btnGeneratePreview');
    if (previewButton) {
      previewButton.disabled = false;
    }
    document.getElementById('previewButtonContainer').style.display = 'none';
    document.getElementById('previewSection').style.display = 'none';
    document.getElementById('uploadStatus').textContent = 'Pronto';
    document.getElementById('messageArea').innerHTML = '';
  }

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('barcodeInput').focus();
  });
</script>

</body>
</html>
