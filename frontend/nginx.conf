server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /leitor {
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    try_files /leitor/index.html =404;
  }

  location /leitor/ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    try_files $uri $uri/ /leitor/index.html;
  }

  location / {
    try_files $uri /index.html;
  }
}
